name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"   # regenerates daily at 00:00 UTC
  push:
    branches:
      - main

jobs:
  github-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # ---- github-stats.svg : header only, no followers/sponsors/watching/community/issues ----
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-stats.svg
          base: header
          config_timezone: Asia/Kolkata
          template: classic
          config_display: compact

      # ---- languages.svg : most-used languages only, recomputed every run ----
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          config_timezone: Asia/Kolkata
          template: classic
          config_display: compact

      # ---- contributions.svg : compact calendar, not full-year, so it doesn't dominate the page ----
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: contributions.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Kolkata
          template: classic
          config_display: compact